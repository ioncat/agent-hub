services:

  # ── pdf-service — Markdown → PDF renderer ─────────────────────────────────
  pdf-service:
    build:
      context: ./services/pdf
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    volumes:
      - ./fonts:/app/fonts:ro              # Segoe UI / Calibri fonts (gitignored, host-provided)
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── knowledge-mirror-parser — URL → Markdown ───────────────────────────────
  kmp-service:
    build:
      context: ../knowledge-mirror-parser
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── career-agent — Telegram bot + RSS watcher ──────────────────────────────
  career-agent:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      KMP_BASE_URL: http://kmp-service:8001
      PDF_SERVICE_URL: http://pdf-service:8002
      DB_PATH: /app/db/agent.db
      VACANCIES_PATH: /app/vacancies
    volumes:
      - ./db:/app/db                        # SQLite DB — persisted on host
      - ./vacancies:/app/vacancies          # vacancy folders — persisted on host
    depends_on:
      kmp-service:
        condition: service_healthy
      pdf-service:
        condition: service_healthy
    restart: unless-stopped

  # ── web-tracker — read-only FastAPI dashboard ──────────────────────────────
  web-tracker:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn web.api:app --host 0.0.0.0 --port 8080
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DB_PATH: /app/db/agent.db
      VACANCIES_PATH: /app/vacancies
    volumes:
      - ./db:/app/db:ro                     # read-only — tracker never writes
      - ./vacancies:/app/vacancies:ro
    depends_on:
      - career-agent
    restart: unless-stopped
