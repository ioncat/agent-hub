services:

  # ── knowledge-mirror-parser — URL → Markdown ───────────────────────────────
  kmp-service:
    build:
      context: ../knowledge-mirror-parser
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── agent-hub — Telegram bot + RSS watcher ─────────────────────────────────
  agent-hub:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      KMP_BASE_URL: http://kmp-service:8001
      DB_PATH: /app/db/agent.db
      VACANCIES_PATH: /app/vacancies
      CALLBACK_CV_PATH: /app/callback-cv
    volumes:
      - ./db:/app/db                        # SQLite DB — persisted on host
      - ./vacancies:/app/vacancies          # vacancy folders — persisted on host
      - ../callback-cv:/app/callback-cv:ro  # PROFILE.md + cv_to_pdf.py (read-only)
    depends_on:
      kmp-service:
        condition: service_healthy
    restart: unless-stopped

  # ── web-tracker — read-only FastAPI dashboard ──────────────────────────────
  web-tracker:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn web.api:app --host 0.0.0.0 --port 8080
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DB_PATH: /app/db/agent.db
      VACANCIES_PATH: /app/vacancies
      CALLBACK_CV_PATH: /app/callback-cv
    volumes:
      - ./db:/app/db:ro                     # read-only — tracker never writes
      - ./vacancies:/app/vacancies:ro
      - ../callback-cv:/app/callback-cv:ro
    depends_on:
      - agent-hub
    restart: unless-stopped
